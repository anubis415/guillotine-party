<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The Guillotine Party emblem: guillotine and broken scales of justice">
  <!-- Matte black badge with gold ring -->
  <circle cx="60" cy="60" r="54" fill="#15171c" stroke="#c9a23a" stroke-width="3"/>
  <!-- Guillotine frame: posts + top beam -->
  <rect x="33" y="24" width="5" height="70" rx="1" fill="#c9a23a"/>
  <rect x="82" y="24" width="5" height="70" rx="1" fill="#c9a23a"/>
  <rect x="30" y="24" width="60" height="7" rx="1" fill="#c9a23a"/>
  <!-- Angled blade (red) -->
  <polygon points="40,32 80,32 80,40 40,50" fill="#c8102e"/>
  <!-- Scales pillar + base -->
  <rect x="58" y="57" width="4" height="29" fill="#c9a23a"/>
  <polygon points="50,86 70,86 74,93 46,93" fill="#c9a23a"/>
  <circle cx="60" cy="57" r="2.6" fill="#c9a23a"/>
  <!-- Left arm (raised) -->
  <line x1="60" y1="57" x2="39" y2="51" stroke="#c9a23a" stroke-width="3.4" stroke-linecap="round"/>
  <line x1="39" y1="51" x2="34.5" y2="64" stroke="#c9a23a" stroke-width="1.4"/>
  <line x1="39" y1="51" x2="43.5" y2="64" stroke="#c9a23a" stroke-width="1.4"/>
  <path d="M33,64 Q39,70 45,64" fill="none" stroke="#c9a23a" stroke-width="2.6"/>
  <!-- Broken crack near pivot -->
  <polyline points="60,56 62.5,58.5 60.8,60.5" fill="none" stroke="#c9a23a" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Right arm (snapped, drooping) -->
  <line x1="64" y1="59" x2="83" y2="68" stroke="#c9a23a" stroke-width="3.4" stroke-linecap="round"/>
  <line x1="83" y1="68" x2="78" y2="80" stroke="#c9a23a" stroke-width="1.4"/>
  <line x1="83" y1="68" x2="88" y2="80" stroke="#c9a23a" stroke-width="1.4"/>
  <path d="M75,80 Q83,89 91,80" fill="none" stroke="#c9a23a" stroke-width="2.6"/>
</svg>
